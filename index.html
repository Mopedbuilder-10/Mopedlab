<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Din Hemsida</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: black;
    }

    .hero {
      height: 80vh;
      background: url("dinbild.jpg") center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
    }

    .content {
      padding: 40px;
      text-align: center;
    }

    .btn {
      background: white;
      color: black;
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  DIN BRAND
</header>

<div class="hero">
  DIN TEXT HÄR
</div>

<div class="content">
  <p>Här kan du skriva vad du vill sälja eller visa</p>
  <a href="#" class="btn">Köp nu</a>
</div>

</body>
</html>
